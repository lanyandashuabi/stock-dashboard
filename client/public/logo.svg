<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="40" height="40">
  <!-- 八角星主体 -->
  <g transform="translate(32 32)">
    <!-- 8个尖角 -->
    <g fill="#c41e3a">
      <path d="M 0,-26 L 4,-6 L 0,0 L -4,-6 Z"/>
      <path d="M 0,-26 L 4,-6 L 0,0 L -4,-6 Z" transform="rotate(45)"/>
      <path d="M 0,-26 L 4,-6 L 0,0 L -4,-6 Z" transform="rotate(90)"/>
      <path d="M 0,-26 L 4,-6 L 0,0 L -4,-6 Z" transform="rotate(135)"/>
      <path d="M 0,-26 L 4,-6 L 0,0 L -4,-6 Z" transform="rotate(180)"/>
      <path d="M 0,-26 L 4,-6 L 0,0 L -4,-6 Z" transform="rotate(225)"/>
      <path d="M 0,-26 L 4,-6 L 0,0 L -4,-6 Z" transform="rotate(270)"/>
      <path d="M 0,-26 L 4,-6 L 0,0 L -4,-6 Z" transform="rotate(315)"/>
    </g>
    <!-- 中心圆 -->
    <circle r="8" fill="#ffd700" stroke="#c41e3a" stroke-width="1.5"/>
    <circle r="4" fill="#c41e3a"/>
  </g>
</svg>
